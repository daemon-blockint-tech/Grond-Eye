services:
  maven:
    build:
      context: .
      args:
        - NEXT_PUBLIC_MAVEN_EDITION=${NEXT_PUBLIC_MAVEN_EDITION:-local}
        - NEXT_PUBLIC_MAVEN_DATA_ENGINE_URL=${NEXT_PUBLIC_MAVEN_DATA_ENGINE_URL:-}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        - NEXT_PUBLIC_CESIUM_ION_TOKEN=${NEXT_PUBLIC_CESIUM_ION_TOKEN:-}
        - NEXT_PUBLIC_ADSENSE_CLIENT_ID=${NEXT_PUBLIC_ADSENSE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    volumes:
      - maven-data:/app/data
      - ./public/plugins-local:/app/public/plugins-local:ro
    env_file:
      - path: .env
        required: false
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:-default_secret_for_local_dev}"
      - "MAVEN_DEMO_ADMIN_SECRET=${MAVEN_DEMO_ADMIN_SECRET:-}"
      - "MAVEN_BRIDGE_TOKEN=${MAVEN_BRIDGE_TOKEN:-}"
      - "DATABASE_URL=postgresql://postgres:postgres@db:5432/maven?schema=public"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maven
    ports:
      - "${MAVEN_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maven"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s

  maven-data-engine:
    image: ghcr.io/daemon-blockint-tech/maven-data-engine:latest
    command: >
      sh -c "
      echo 'Syncing workspace dependencies...' &&
      cd $$SEEDERS_DIR/community && CI=true pnpm install --ignore-scripts && pnpm -r rebuild better-sqlite3 esbuild &&
      if [ -d \"$$SEEDERS_DIR/private\" ]; then cd $$SEEDERS_DIR/private && CI=true pnpm install --ignore-scripts && pnpm -r rebuild better-sqlite3 esbuild; fi &&
      cd /app && node dist/server.js"
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_URL=redis://maven-redis:6379
      - SEEDERS_DIR=/app/seeders
      - DB_PATH=/app/data/engine.db
    depends_on:
      maven-redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - engine

  maven-redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - engine

networks:
  coolify:
    external: true

volumes:
  maven-data:
  postgres-data:
